<div class='widget-container'>
    <div class='album-art-bg' id='artwork-bg'>
        <!-- Avoid using the raw placeholder in src (browser will request it). Store in data-artwork so JS can set src when data arrives. -->
        <img id='artwork-img' src='' data-artwork='{artwork_base64}' class='' alt='Album Art'/>
    </div>
    <div class='info-box'>
        <div class='track-title'>{title}</div>
        <div class='track-artist'>{artist}</div>
        <div class='track-album'>{album}</div>
        <div class='progress-container'>
            <div class='progress-bar'></div>
        </div>
        <div style='display: flex; justify-content: space-between; align-items: center;'>
            <span class='progress-time' id='current-time'>{current_time}</span>
            <span class='progress-duration'>{duration_time}</span>
        </div>
    </div>
</div>

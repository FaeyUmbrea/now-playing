name: Build and Upload Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: now-playing-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: now-playing-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: now-playing-windows
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: Build release
        run: cargo build --release --package now-playing --target ${{ matrix.target }}
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/now-playing" dist/now-playing
          tar -C dist -czf "dist/${{ matrix.artifact }}-${TAG}.tar.gz" now-playing
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/now-playing.exe" dist/now-playing.exe
          cd dist
          7z a "${{ matrix.artifact }}-${TAG}.zip" now-playing.exe
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.artifact }}-${{ github.event.release.tag_name }}.tar.gz
            dist/${{ matrix.artifact }}-${{ github.event.release.tag_name }}.zip
          fail_on_unmatched_files: false

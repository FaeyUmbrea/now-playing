name: Draft Release

on:
  push:
    branches: [main]

permissions:
  contents: write

# Keeps a single rolling draft release whose body is the auto-generated
# changelog of everything since the last published release. The version is
# intentionally left unset — at release time you open the draft, type the
# version number, and click Publish. Publishing creates the tag and triggers
# build-and-upload-release-artifacts.yml.
jobs:
  draft:
    name: Update Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: |
          cargo install git-cliff --locked --version 2.10.1 || true
          if ! command -v git-cliff >/dev/null 2>&1; then
            cargo install git-cliff --locked || true
          fi

      - name: Generate changelog since last release
        run: |
          git fetch --tags
          git-cliff --unreleased --output changelog.md || true
          if [ ! -s changelog.md ]; then
            git log --pretty=format:'* %s (%h)' "$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)"..HEAD > changelog.md || true
          fi
          if [ ! -s changelog.md ]; then
            echo "No changes yet." > changelog.md
          fi

      - name: Create or update rolling draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: next
          name: Next release (draft)
          body_path: changelog.md
          draft: true
          prerelease: false

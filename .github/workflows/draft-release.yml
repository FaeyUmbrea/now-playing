name: Draft Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  draft:
    name: Update Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: |
          cargo install git-cliff --locked --version 2.10.1 || true
          if ! command -v git-cliff >/dev/null 2>&1; then
            cargo install git-cliff --locked || true
          fi

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate changelog since last tag
        run: |
          git fetch --tags
          git-cliff --unreleased --tag "v${{ steps.version.outputs.version }}" --output changelog.md || true
          if [ ! -s changelog.md ]; then
            git log --pretty=format:'* %s (%h)' "$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)"..HEAD > changelog.md || true
          fi
          if [ ! -s changelog.md ]; then
            echo "No changes yet." > changelog.md
          fi

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: changelog.md
          draft: true
          prerelease: false

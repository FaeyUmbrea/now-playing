name: Create Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  create_release:
    name: Create GitHub Release for tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install git-cliff
        run: |
          # Install a pinned version of git-cliff for stable changelog generation
          cargo install git-cliff --locked --version 0.11.0

      - name: Generate changelog
        id: gen-changelog
        run: |
          git fetch --tags
          # Attempt to use git-cliff to generate human-friendly changelog for the new tag
          git-cliff --tag "${{ github.ref_name }}" --no-emoji --output changelog.md || true
          # Fallback to a simple git log if git-cliff didn't produce output
          if [ ! -s changelog.md ]; then
            git log -n 50 --pretty=format:'* %s (%h)' "${{ github.ref_name }}" > changelog.md || true
          fi
          if [ ! -s changelog.md ]; then
            echo "No changelog available." > changelog.md
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: ${{ steps.gen-changelog.outputs.changelog }}
          draft: false
          prerelease: false
